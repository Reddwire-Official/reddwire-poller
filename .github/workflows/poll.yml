name: Reddwire Poller

on:
  schedule:
    # Fallback kick-start ONLY: GitHub Actions throttles free-tier `schedule:`
    # events heavily under load (often 30-120 min between fires), so we don't
    # rely on it for our 5-min cadence. The chain self-dispatches below.
    # This 30-min schedule just restarts the chain if it ever dies.
    - cron: '*/30 * * * *'
  workflow_dispatch:

# Serialize runs so we never poll Reddit twice at the same time.
concurrency:
  group: reddwire-poll
  cancel-in-progress: false

jobs:
  poll:
    # NOTE: Reddit cycles through blocking different cloud IP ranges. macOS
    # runners worked in May 2026 but got blocked. If ubuntu starts 403ing too,
    # the next move is Reddit OAuth (see README).
    runs-on: ubuntu-latest
    timeout-minutes: 6 # 4 min work budget + up to 2 min sleep before dispatch
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Poll Reddit and forward to Worker
        id: poll
        env:
          REDDWIRE_INTERNAL_SECRET: ${{ secrets.REDDWIRE_INTERNAL_SECRET }}
          REDDWIRE_API_URL: https://api.reddwire.dev
        run: node poll.mjs

      # Self-dispatching chain — bypasses GitHub free-tier cron throttling.
      # Each run waits until 5 min after THIS run started, then triggers the
      # next run via workflow_dispatch (fires within ~10 sec). Result: real
      # 5-min cadence regardless of GitHub Actions schedule throttling.
      #
      # If anything in this step fails, the `*/30 * * * *` schedule above
      # restarts the chain within 30 minutes.
      - name: Pace to 5-minute boundary
        if: always()
        run: |
          ELAPSED=$SECONDS
          REMAINING=$((300 - ELAPSED))
          if [ $REMAINING -gt 0 ]; then
            echo "Sleeping ${REMAINING}s before dispatching next run"
            sleep $REMAINING
          fi

      - name: Trigger next run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.SELF_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "SELF_DISPATCH_TOKEN not set — chain will not continue."
            echo "Set this secret to enable real 5-min cadence; otherwise"
            echo "we fall back to the 30-min schedule (3x slower)."
            exit 0
          fi
          curl -sS -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/poll.yml/dispatches" \
            -d '{"ref":"main"}' \
            && echo "Next run dispatched." \
            || echo "Self-dispatch failed; */30 cron will recover."
